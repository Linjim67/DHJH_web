<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暑期成績單</title>

    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Material Symbols (用於展開/收合箭頭) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* 隱藏滾動條但保留功能 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* 展開動畫過渡 */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }
        .accordion-content.is-open {
            grid-template-rows: 1fr;
        }
        .accordion-inner {
            overflow: hidden;
        }
        
        /* 箭頭旋轉動畫 */
        .chevron { transition: transform 0.3s ease; }
        .is-open .chevron { transform: rotate(180deg); }
        
    </style>
    </head>

<body class="p-4 md:p-8 text-gray-800">

    <!-- 載入中畫面 -->
    <div id="loading" class="flex flex-col items-center justify-center py-32 space-y-4">
        <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="text-gray-500 font-medium tracking-wider">系統載入中...</p>
    </div>

    <!-- 主要內容區 -->
    <div id="transcript-content" class="hidden max-w-5xl mx-auto space-y-6">

        <!-- Header -->
        <header
            class="bg-white p-6 rounded-[24px] shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-10 opacity-50"></div>
            <div>
                <h1 class="text-3xl font-bold text-gray-800 tracking-tight">暑期化學營成績單</h1>
                <p id="student-name" class="text-gray-500 mt-1 font-medium">學生：載入中...</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-center">
                    <div class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-1">理論總分</div>
                    <div id="theory-total-score" class="text-3xl font-bold text-emerald-600">--</div>
                </div>
                <div class="w-px h-10 bg-gray-200"></div>
                <div class="w-px h-10 bg-gray-200"></div>
                <div class="text-center">
                    <div class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-1">已交卷人數</div>
                    <div id="total-students" class="text-3xl font-bold text-blue-600">0</div>
                </div>
            </div>
        </header>

        <!-- 圖例說明 -->
        <div class="flex flex-wrap items-center justify-end gap-4 text-xs font-medium text-gray-500 px-2">
            <div class="flex items-center gap-1.5">
                <div class="w-4 h-4 bg-white border-2 border-[#5b697b] rounded-[3px]"></div> 50% 學生分佈 (Q1-Q3)
            </div>
            <div class="flex items-center gap-1.5">
                <div class="w-0.5 h-4 bg-[#5b697b] rounded-full"></div> 中位數 (Median)
            </div>
            <div class="flex items-center gap-1.5">
                <div class="w-4 h-4 bg-[#a5b4fc] border-2 border-[#1e3a8a] rounded-[3px] opacity-75"></div> 您的得分
            </div>
        </div>

        <!-- 理論試題分析區塊 (動態生成) -->
        <main id="theory-container" class="space-y-4">
            <!-- 這裡將由 JS 動態塞入大題區塊 -->
        </main>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 將原本的 __firebase_config 判斷，直接替換為您真實的金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyAZ7cCQlXh8oiNzwnT2LL07KPt5TMaI2d8",
            authDomain: "dhjhweb.firebaseapp.com",
            projectId: "dhjhweb",
            storageBucket: "dhjhweb.firebasestorage.app",
            messagingSenderId: "763721572642",
            appId: "1:763721572642:web:fee3751366cba01bc0c57b",
            measurementId: "G-9CM3NBLLLS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // 核心繪圖函數：生成 SVG Box Plot (水平與垂直)
        // ==========================================

        /* STREAMING_CHUNK:重寫為極簡扁平化向量風格盒鬚圖 */
        // 生成水平盒鬚圖 (大題用)
        function createHorizontalBoxPlot(min, max, lq, median, uq, score, maxScore) {
            // 直接轉換為百分比座標，避免 viewBox 縮放造成的圖形變形
            const xMin = (min / maxScore) * 100;
            const xMax = (max / maxScore) * 100;
            const xLq = (lq / maxScore) * 100;
            const xUq = (uq / maxScore) * 100;
            const xMed = (median / maxScore) * 100;
            const xScore = (score / maxScore) * 100;

            return `
                <svg width="100%" height="40" class="overflow-visible">
                    <!-- 邊界參考線 (0% 與 100%) -->
                    <line x1="0%" y1="10" x2="0%" y2="30" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="100%" y1="10" x2="100%" y2="30" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />

                    <!-- Whisker 實線 (Min到Q1, Q3到Max) -->
                    <line x1="${xMin}%" y1="20" x2="${xLq}%" y2="20" stroke="#5b697b" stroke-width="2.5" />
                    <line x1="${xUq}%" y1="20" x2="${xMax}%" y2="20" stroke="#5b697b" stroke-width="2.5" />
                    
                    <!-- Min/Max 邊界端點 -->
                    <line x1="${xMin}%" y1="14" x2="${xMin}%" y2="26" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="${xMax}%" y1="14" x2="${xMax}%" y2="26" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    
                    <!-- Box (Q1 到 Q3) - 確保最小寬度至少為 1% -->
                    <rect x="${xLq}%" y="10" width="${Math.max(1, xUq - xLq)}%" height="20" rx="4" fill="#ffffff" stroke="#5b697b" stroke-width="2.5" />
                    
                    <!-- 中位數 (Median) -->
                    <line x1="${xMed}%" y1="10" x2="${xMed}%" y2="30" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    
                    <!-- 學生個人得分 (固定像素的圓角方塊，利用 SVG 嵌套置中避免變形) -->
                    <svg x="${xScore}%" y="20" width="20" height="20" style="overflow:visible;">
                        <!-- STREAMING_CHUNK:加入 opacity 增加水平圖表透明度 -->
                        <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#a5b4fc" stroke="#1e3a8a" stroke-width="2.5" opacity="0.75" />
                    </svg>
                </svg>
            `;
        }

        // 生成垂直盒鬚圖 (單題用，最高分恆定為 5 分)
        function createVerticalBoxPlot(min, max, lq, median, uq, score) {
            // Y 軸從下到上是 0% 到 100%，SVG的 y=0 則是在畫面上方
            const mapY = (val) => 100 - ((val / 5) * 100);
            const yMin = mapY(min);
            const yMax = mapY(max);
            const yLq = mapY(lq);
            const yUq = mapY(uq);
            const yMed = mapY(median);
            const yScore = mapY(score);

            return `
                <svg width="40" height="100%" style="min-height:100px;" class="overflow-visible">
                    <!-- 背景參考線 (0分, 5分) -->
                    <line x1="10" y1="100%" x2="30" y2="100%" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="10" y1="0%" x2="30" y2="0%" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />

                    <!-- Whisker 實線 (垂直方向，由低到高) -->
                    <line x1="20" y1="${yMin}%" x2="20" y2="${yLq}%" stroke="#5b697b" stroke-width="2.5" />
                    <line x1="20" y1="${yUq}%" x2="20" y2="${yMax}%" stroke="#5b697b" stroke-width="2.5" />
                    
                    <!-- Min/Max 邊界端點 -->
                    <line x1="14" y1="${yMin}%" x2="26" y2="${yMin}%" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="14" y1="${yMax}%" x2="26" y2="${yMax}%" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    
                    <!-- Box (Q1 到 Q3) - SVG 起點在上方 (yUq)，高度為下端減上端 -->
                    <rect x="10" y="${yUq}%" width="20" height="${Math.max(1, yLq - yUq)}%" rx="4" fill="#ffffff" stroke="#5b697b" stroke-width="2.5" />
                    
                    <!-- 中位數 (Median) -->
                    <line x1="10" y1="${yMed}%" x2="30" y2="${yMed}%" stroke="#5b697b" stroke-width="2.5" stroke-linecap="round" />
                    
                    <!-- 學生個人得分 (固定像素圓角方塊) -->
                    <svg x="20" y="${yScore}%" width="20" height="20" style="overflow:visible;">
                        <!-- STREAMING_CHUNK:加入 opacity 增加垂直圖表透明度 -->
                        <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#a5b4fc" stroke="#1e3a8a" stroke-width="2.5" opacity="0.75" />
                    </svg>
                </svg>
            `;
        }

        // ==========================================
        // 渲染畫面邏輯
        // ==========================================
        function renderTranscript(studentData, publicData) {
            document.getElementById('total-students').innerText = publicData.totalStudents;
            document.getElementById('practical-score').innerText = studentData.practicalScore || 0;

            const container = document.getElementById('theory-container');
            container.innerHTML = ''; // 清空

            Object.keys(QUESTION_GROUPS).forEach(groupId => {
                const groupStats = publicData.groups[groupId];

                if (!groupStats) return;

                const myGroupScore = studentData.groupScores[groupId] || 0;

                // 1. 建立大題容器
                const groupEl = document.createElement('section');
                groupEl.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden";

                // 2. 建立大題 Header (包含統計文字與水平 Box Plot)
                const headerEl = document.createElement('div');
                headerEl.className = "p-5 cursor-pointer hover:bg-gray-50 transition-colors flex flex-col md:flex-row gap-6 items-center group-header";

                headerEl.innerHTML = `
                <!-- 左側：標題與數據網格 -->
                <div class="w-full md:w-1/2 flex-shrink-0">
                    <div class="flex justify-between items-end mb-3 border-b pb-2">
                        <h2 class="text-xl font-bold text-gray-800">${groupStats.title}</h2>
                        <div class="text-lg font-bold text-blue-600 bg-blue-50 px-3 py-0.5 rounded-lg">
                            得分: ${myGroupScore} <span class="text-sm text-gray-400 font-medium">/ ${groupStats.maxScore}</span>
                        </div>
                    </div>
                    
                    <!-- 完美還原圖片的 3x2 數據排版 -->
                    <div class="grid grid-cols-3 gap-x-2 gap-y-1.5 text-[13px] text-gray-600">
                        <div><span class="font-medium">Mean:</span> ${groupStats.mean.toFixed(2)}</div>
                        <div><span class="font-medium">High:</span> ${groupStats.high}</div>
                        <div><span class="font-medium">Low:</span> ${groupStats.low}</div>
                        <div><span class="font-medium">Median:</span> ${groupStats.median}</div>
                        <div><span class="font-medium">Upper Q:</span> ${groupStats.uq}</div>
                        <div><span class="font-medium">Lower Q:</span> ${groupStats.lq}</div>
                    </div>
                </div>
                
                <!-- 右側：水平 Box Plot 與箭頭 -->
                <div class="w-full md:w-1/2 flex items-center gap-4 pt-4 md:pt-0 border-t md:border-t-0">
                    <div class="flex-1 relative h-[40px]">
                        <!-- 繪製 SVG -->
                        ${createHorizontalBoxPlot(
                    groupStats.low, groupStats.high,
                    groupStats.lq, groupStats.median, groupStats.uq,
                    myGroupScore, groupStats.maxScore
                )}
                    </div>
                    <span class="material-symbols-outlined text-gray-400 chevron text-2xl">expand_more</span>
                </div>
            `;

                // 3. 建立子題容器 (Accordion)
                const contentEl = document.createElement('div');
                contentEl.className = "accordion-content bg-[#f8fafc] border-t border-gray-100";

                // 子題列表
                let questionsHtml = '<div class="accordion-inner"><div class="p-6 flex flex-wrap gap-4 md:gap-6 justify-center md:justify-start">';

                groupStats.questions.forEach(qId => {
                    const qStats = publicData.questions[qId];
                    const myScore = studentData.theoryScores[qId] !== undefined ? studentData.theoryScores[qId] : 0;

                    // 若沒有此題的統計資料則略過
                    if (!qStats) return;

                    questionsHtml += `
                    <div class="flex flex-col items-center bg-white p-3 rounded-xl border border-gray-200 shadow-sm w-[72px] hover:shadow-md transition-shadow">
                        <div class="text-sm font-bold text-gray-700 mb-1">${qId}</div>
                        <div class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded mb-3 border border-blue-100">
                            ${myScore}<span class="text-gray-400">/5</span>
                        </div>
                        <!-- 繪製垂直 Box Plot -->
                        <div class="relative w-10 h-[100px]">
                            ${createVerticalBoxPlot(
                        qStats.low, qStats.high,
                        qStats.lq, qStats.median, qStats.uq,
                        myScore
                    )}
                        </div>
                    </div>
                `;
                });

                questionsHtml += '</div></div>';
                contentEl.innerHTML = questionsHtml;

                // 綁定點擊展開事件
                headerEl.addEventListener('click', () => {
                    contentEl.classList.toggle('is-open');
                    headerEl.classList.toggle('is-open');
                });

                groupEl.appendChild(headerEl);
                groupEl.appendChild(contentEl);
                container.appendChild(groupEl);
            });

            // 隱藏載入中，顯示內容
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('transcript-content').classList.remove('hidden');
        }

        // ==========================================
        // 初始化與身份驗證
        // ==========================================

        // 定義大題結構與配分 (供前端自動計算大題總分與防呆使用)
        const QUESTION_GROUPS = {
            "Part1": { title: "第一大題", questions: ["1", "2", "3", "4", "5"], maxScore: 25 },
            "Part2": { title: "第二大題", questions: ["6", "7"], maxScore: 10 },
            "Part3": { title: "第三大題", questions: ["8", "9", "10"], maxScore: 15 },
            "Part4": { title: "第四大題", questions: Array.from({ length: 10 }, (_, i) => (i + 11).toString()), maxScore: 50 },
            "Part5": {
                title: "第五大題",
                questions: ["21", "22", "23-1", "23-2", "24", "25", "26", "27", "28", "29", "30-1", "30-2"],
                maxScore: 60
            }
        };

        function generateFakePublicData() {
            const fakeData = {
                totalStudents: 156, // 假裝有 156 人交卷
                groups: {
                    "Part1": {
                        title: "第一大題", maxScore: 25,
                        mean: 18.5, median: 20, high: 25, low: 5, uq: 25, lq: 15,
                        questions: ["1", "2", "3", "4", "5"]
                    },
                    "Part2": {
                        title: "第二大題", maxScore: 10,
                        mean: 7.2, median: 10, high: 10, low: 0, uq: 10, lq: 5,
                        questions: ["6", "7"]
                    },
                    "Part3": {
                        title: "第三大題", maxScore: 15,
                        mean: 9.8, median: 10, high: 15, low: 0, uq: 15, lq: 5,
                        questions: ["8", "9", "10"]
                    },
                    "Part4": {
                        title: "第四大題", maxScore: 50,
                        mean: 32.5, median: 35, high: 50, low: 10, uq: 40, lq: 25,
                        questions: Array.from({ length: 10 }, (_, i) => (i + 11).toString())
                    },
                    "Part5": {
                        title: "第五大題", maxScore: 60,
                        mean: 38.4, median: 40, high: 60, low: 15, uq: 50, lq: 30,
                        questions: ["21", "22", "23-1", "23-2", "24", "25", "26", "27", "28", "29", "30-1", "30-2"]
                    }
                },
                questions: {}
            };

            // 自動產生 1~30 題的單題假數據
            const allQuestionIds = Object.values(QUESTION_GROUPS).flatMap(group => group.questions);

            // 準備幾種不同難度的分數分佈模板，讓每一題的盒鬚圖高低錯落有致
            const distributionTemplates = [
                { median: 4, high: 5, low: 1, uq: 5, lq: 3 }, // 簡單題 (箱子偏高)
                { median: 3, high: 5, low: 0, uq: 4, lq: 2 }, // 中等題 (箱子置中)
                { median: 2, high: 5, low: 0, uq: 3, lq: 1 }, // 偏難題 (箱子偏低)
                { median: 5, high: 5, low: 2, uq: 5, lq: 4 }, // 送分題 (箱子極高)
                { median: 4, high: 5, low: 0, uq: 5, lq: 2 }  // 鑑別度高的題目 (箱子很長)
            ];

            allQuestionIds.forEach(qId => {
                // 每跑一題，就隨機抽選一個上面的模板
                const template = distributionTemplates[Math.floor(Math.random() * distributionTemplates.length)];

                fakeData.questions[qId] = {
                    // 讓平均分在該題的中位數附近隨機浮動
                    mean: +(template.median - 0.3 + Math.random() * 0.6).toFixed(1),
                    median: template.median,
                    high: template.high,
                    low: template.low,
                    uq: template.uq,
                    lq: template.lq
                };
            });

            return fakeData;
        }

        if (!auth) {
            document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Firebase 初始化失敗，請檢查金鑰設定。</p>`;
        } else {
            onAuthStateChanged(auth, async (user) => {
                if (!user || user.isAnonymous) {
                    document.getElementById('transcript-content').classList.add('hidden');
                    document.getElementById('loading').innerHTML = `
                            <div class="text-center p-8 bg-white rounded-2xl shadow-sm border border-gray-100">
                                <span class="material-symbols-outlined text-red-400 text-5xl mb-4">lock</span>
                                <h2 class="text-xl font-bold text-gray-800">請先登入</h2>
                                <p class="text-gray-500 mt-2">正在同步登入狀態... 若長時間未解鎖，請確認您已在主網站登入。</p>
                            </div>`;
                    document.getElementById('loading').classList.remove('hidden');
                    return;
                }

                try {
                    document.getElementById('student-name').innerText = `學生：${user.displayName || user.email}`;

                    // ----------------------------------------------------
                    // 1. 取得學生個人成績
                    // ----------------------------------------------------
                    const myResultRef = doc(db, 'artifacts', 'dhjh-summer-camp', 'users', user.uid, 'exam_results', 'theory_test_1');
                    const myResultSnap = await getDoc(myResultRef);

                    if (!myResultSnap.exists()) {
                        document.getElementById('loading').innerHTML = `
                            <div class="text-center p-6">
                                <span class="material-symbols-outlined text-gray-400 text-5xl mb-2">assignment_late</span>
                                <p class="text-gray-600 font-bold mb-1">您尚未交卷或查無成績資料</p>
                                <p class="text-sm text-gray-400">請確認您已完成「暑期理論作答」並成功送出。</p>
                            </div>`;
                        return;
                    }

                    const rawStudentData = myResultSnap.data();
                    const rawTheoryScores = rawStudentData.theoryScores || {};

                    const theoryScores = {};
                    Object.keys(rawTheoryScores).forEach(key => {
                        let cleanKey = key.replace(/^q/i, '');

                        if (cleanKey === '231') cleanKey = '23-1';
                        if (cleanKey === '232') cleanKey = '23-2';
                        if (cleanKey === '301') cleanKey = '30-1';
                        if (cleanKey === '302') cleanKey = '30-2';

                        theoryScores[cleanKey] = rawTheoryScores[key];
                    });

                    // 前端動態計算各大題得分與理論總分
                    let theoryTotalScore = 0;
                    const groupScores = {};
                    Object.entries(QUESTION_GROUPS).forEach(([groupId, groupInfo]) => {
                        groupScores[groupId] = groupInfo.questions.reduce((sum, qId) => {
                            const score = theoryScores[qId] || 0;
                            theoryTotalScore += score;
                            return sum + score;
                        }, 0);
                    });

                    const studentData = {
                        theoryTotalScore: theoryTotalScore,
                        theoryScores: theoryScores,
                        groupScores: groupScores
                    };

                    /* STREAMING_CHUNK:判斷作答人數來決定使用真實或模擬數據 */
                    // ----------------------------------------------------
                    // 2. 取得全班統計資料 (Public Data)
                    // ----------------------------------------------------
                    const publicStatsRef = doc(db, 'public_data', 'theory_test_1_stats');
                    const publicStatsSnap = await getDoc(publicStatsRef);

                    let publicData;
                    if (publicStatsSnap.exists() && publicStatsSnap.data().totalStudents > 1) {
                        // 有真實資料，且作答人數大於 1 時，使用真實平均計算
                        publicData = publicStatsSnap.data();
                    } else {
                        // 若沒有資料，或是作答人數只有 0 或 1 人，採用「掰的」平均分數
                        console.warn("作答人數 ≤ 1，系統自動採用模擬常態分佈資料。");
                        publicData = generateFakePublicData();
                    }

                    // ----------------------------------------------------
                    // 3. 渲染畫面
                    // ----------------------------------------------------
                    renderTranscript(studentData, publicData);

                } catch (e) {
                    console.error("資料讀取失敗:", e);
                    document.getElementById('loading').innerHTML = `
                        <div class="text-center p-6">
                            <span class="material-symbols-outlined text-red-500 text-5xl mb-2">error</span>
                            <p class="text-red-500 font-bold">資料讀取失敗</p>
                            <p class="text-xs text-gray-400 mt-2">${e.message}</p>
                        </div>`;
                }
            });
        }
    </script>
</body>

</html>
