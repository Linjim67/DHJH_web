<head>

    <!-- 載入 Tailwind CSS -->

    <!-- 載入 Material Symbols (用於展開/收合箭頭) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* 隱藏滾動條但保留功能 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* 展開動畫過渡 */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }
        .accordion-content.is-open {
            grid-template-rows: 1fr;
        }
        .accordion-inner {
            overflow: hidden;
        }
        
        /* 箭頭旋轉動畫 */
        .chevron { transition: transform 0.3s ease; }
        .is-open .chevron { transform: rotate(180deg); }

        /* STREAMING_CHUNK:升級盒鬚圖專用高級樣式與動畫 */
        /* 學生得分呼吸燈動畫 */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .student-glow {
            transform-origin: center;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        /* SVG 基礎線條樣式 (顏色改由 SVG 屬性直接控制以支援漸層) */
        .box-plot-whisker { stroke-linecap: round; }
        .box-plot-median { stroke-linecap: round; }
        .box-plot-student-line { stroke-linecap: round; }
    </style>
    </head>

 // ==========================================
    // 核心繪圖函數：生成 SVG Box Plot (水平與垂直)

    /* STREAMING_CHUNK:重寫水平盒鬚圖，加入漸層與陰影 */
    // 生成水平盒鬚圖 (大題用)
    function createHorizontalBoxPlot(min, max, lq, median, uq, score, maxScore) {
        const mapX = (val) => (val / maxScore) * 100;
        const xMin = mapX(min), xMax = mapX(max);
        const xLq = mapX(lq), xUq = mapX(uq), xMed = mapX(median);
        const xScore = mapX(score);

        // 確保箱子寬度至少有 2px，避免分數過於集中時箱子消失
        const boxWidth = Math.max(2, xUq - xLq);

        return `
                <svg width="100%" height="40" viewBox="0 0 100 40" preserveAspectRatio="none" class="overflow-visible">
                    <defs>
                        <!-- 柔和的箱子漸層 -->
                        <linearGradient id="boxGradH" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#e0e7ff" />
                            <stop offset="100%" stop-color="#c7d2fe" />
                        </linearGradient>
                        <!-- 底部陰影 -->
                        <filter id="shadowH" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#3730a3" flood-opacity="0.15"/>
                        </filter>
                    </defs>
                    
                    <!-- Whisker 虛線 (Min 到 Max) -->
                    <line x1="${xMin}" y1="20" x2="${xMax}" y2="20" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 3" class="box-plot-whisker" />
                    
                    <!-- Min/Max 邊界端點 (加粗圓角) -->
                    <line x1="${xMin}" y1="14" x2="${xMin}" y2="26" stroke="#64748b" stroke-width="2.5" class="box-plot-whisker" />
                    <line x1="${xMax}" y1="14" x2="${xMax}" y2="26" stroke="#64748b" stroke-width="2.5" class="box-plot-whisker" />
                    
                    <!-- Box (Q1 到 Q3)，加入圓角 rx=4 與陰影 -->
                    <rect x="${xLq}" y="12" width="${boxWidth}" height="16" rx="4" fill="url(#boxGradH)" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadowH)" />
                    
                    <!-- 中位數 (Median) -->
                    <line x1="${xMed}" y1="12" x2="${xMed}" y2="28" stroke="#312e81" stroke-width="2" class="box-plot-median" />
                    
                    <!-- 學生個人得分 (複合式地標設計) -->
                    <g transform="translate(${xScore}, 20)">
                        <!-- 呼吸燈外圈 -->
                        <circle cx="0" cy="0" r="5" fill="#fecaca" class="student-glow" />
                        <!-- 紅色基準線 -->
                        <line x1="0" y1="-14" x2="0" y2="14" stroke="#ef4444" stroke-width="2" class="box-plot-student-line" />
                        <!-- 實體紅點白框 -->
                        <circle cx="0" cy="0" r="4.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
                    </g>
                </svg>
            `;
    }

    /* STREAMING_CHUNK:重寫垂直盒鬚圖，優化單題視覺 */
    // 生成垂直盒鬚圖 (單題用，最高分恆定為 5 分)
    function createVerticalBoxPlot(min, max, lq, median, uq, score) {
        const mapY = (val) => 100 - ((val / 5) * 100);
        const yMin = mapY(min), yMax = mapY(max);
        const yLq = mapY(lq), yUq = mapY(uq), yMed = mapY(median);
        const yScore = mapY(score);

        const boxHeight = Math.max(2, yLq - yUq);

        return `
                <svg width="40" height="100" viewBox="0 0 40 100" class="overflow-visible drop-shadow-sm">
                    <defs>
                        <!-- 垂直箱子漸層 -->
                        <linearGradient id="boxGradV" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#e0e7ff" />
                            <stop offset="100%" stop-color="#c7d2fe" />
                        </linearGradient>
                        <filter id="shadowV" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#3730a3" flood-opacity="0.15"/>
                        </filter>
                        <!-- 紅點發光濾鏡 -->
                        <filter id="glowRed">
                            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#ef4444" flood-opacity="0.4"/>
                        </filter>
                    </defs>

                    <!-- 背景參考點 (0分, 5分) -->
                    <circle cx="20" cy="0" r="1.5" fill="#cbd5e1" />
                    <circle cx="20" cy="100" r="1.5" fill="#cbd5e1" />

                    <!-- Whisker 虛線 (垂直) -->
                    <line x1="20" y1="${yMin}" x2="20" y2="${yMax}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 3" class="box-plot-whisker" />
                    
                    <!-- Min/Max 邊界端點 -->
                    <line x1="14" y1="${yMin}" x2="26" y2="${yMin}" stroke="#64748b" stroke-width="2.5" class="box-plot-whisker" />
                    <line x1="14" y1="${yMax}" x2="26" y2="${yMax}" stroke="#64748b" stroke-width="2.5" class="box-plot-whisker" />
                    
                    <!-- Box (Q1 到 Q3) -->
                    <rect x="12" y="${yUq}" width="16" height="${boxHeight}" rx="4" fill="url(#boxGradV)" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadowV)" />
                    
                    <!-- 中位數 (Median) -->
                    <line x1="12" y1="${yMed}" x2="28" y2="${yMed}" stroke="#312e81" stroke-width="2" class="box-plot-median" />
                    
                    <!-- 學生個人得分 (帶陰影的高亮圓點) -->
                    <circle cx="20" cy="${yScore}" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" filter="url(#glowRed)" />
                </svg>
            `;
    }

        // ==========================================
        // 渲染畫面邏輯
        // ==========================================
        function renderTranscript(studentData, publicData) {
            document.getElementById('total-students').innerText = publicData.totalStudents;
            document.getElementById('theory-total-score').innerText = studentData.theoryTotalScore || 0;

            const container = document.getElementById('theory-container');
            container.innerHTML = ''; // 清空

            // 遍歷所有大題
            Object.entries(publicData.groups).forEach(([groupId, groupStats]) => {
                const myGroupScore = studentData.groupScores[groupId] || 0;

                // 1. 建立大題容器
                const groupEl = document.createElement('section');
                groupEl.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden";

                // 2. 建立大題 Header (包含統計文字與水平 Box Plot)
                const headerEl = document.createElement('div');
                headerEl.className = "p-5 cursor-pointer hover:bg-gray-50 transition-colors flex flex-col md:flex-row gap-6 items-center group-header";

                headerEl.innerHTML = `
                    <!-- 左側：標題與數據網格 -->
                    <div class="w-full md:w-1/2 flex-shrink-0">
                        <div class="flex justify-between items-end mb-3 border-b pb-2">
                            <h2 class="text-xl font-bold text-gray-800">${groupStats.title}</h2>
                            <div class="text-lg font-bold text-blue-600 bg-blue-50 px-3 py-0.5 rounded-lg">
                                得分: ${myGroupScore} <span class="text-sm text-gray-400 font-medium">/ ${groupStats.maxScore}</span>
                            </div>
                        </div>
                        
                        <!-- 完美還原圖片的 3x2 數據排版 -->
                        <div class="grid grid-cols-3 gap-x-2 gap-y-1.5 text-[13px] text-gray-600">
                            <div><span class="font-medium">Mean:</span> ${groupStats.mean.toFixed(2)}</div>
                            <div><span class="font-medium">High:</span> ${groupStats.high}</div>
                            <div><span class="font-medium">Low:</span> ${groupStats.low}</div>
                            <div><span class="font-medium">Median:</span> ${groupStats.median}</div>
                            <div><span class="font-medium">Upper Q:</span> ${groupStats.uq}</div>
                            <div><span class="font-medium">Lower Q:</span> ${groupStats.lq}</div>
                        </div>
                    </div>
                    
                    <!-- 右側：水平 Box Plot 與箭頭 -->
                    <div class="w-full md:w-1/2 flex items-center gap-4 pt-4 md:pt-0 border-t md:border-t-0">
                        <div class="flex-1 relative h-[40px]">
                            <!-- 繪製 SVG -->
                            ${createHorizontalBoxPlot(
                    groupStats.low, groupStats.high,
                    groupStats.lq, groupStats.median, groupStats.uq,
                    myGroupScore, groupStats.maxScore
                )}
                        </div>
                        <span class="material-symbols-outlined text-gray-400 chevron text-2xl">expand_more</span>
                    </div>
                `;

                // 3. 建立子題容器 (Accordion)
                const contentEl = document.createElement('div');
                contentEl.className = "accordion-content bg-[#f8fafc] border-t border-gray-100";

                // 子題列表
                let questionsHtml = '<div class="accordion-inner"><div class="p-6 flex flex-wrap gap-4 md:gap-6 justify-center md:justify-start">';

                groupStats.questions.forEach(qId => {
                    const qStats = publicData.questions[qId];
                    const myScore = studentData.theoryScores[qId] !== undefined ? studentData.theoryScores[qId] : 0;

                    // 若沒有此題的統計資料則略過
                    if (!qStats) return;

                    questionsHtml += `
                        <div class="flex flex-col items-center bg-white p-3 rounded-xl border border-gray-200 shadow-sm w-[72px] hover:shadow-md transition-shadow">
                            <div class="text-sm font-bold text-gray-700 mb-1">${qId}</div>
                            <div class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded mb-3 border border-blue-100">
                                ${myScore}<span class="text-gray-400">/5</span>
                            </div>
                            <!-- 繪製垂直 Box Plot -->
                            <div class="relative w-10 h-[100px]">
                                ${createVerticalBoxPlot(
                        qStats.low, qStats.high,
                        qStats.lq, qStats.median, qStats.uq,
                        myScore
                    )}
                            </div>
                        </div>
                    `;
                });

                questionsHtml += '</div></div>';
                contentEl.innerHTML = questionsHtml;

                // 綁定點擊展開事件
                headerEl.addEventListener('click', () => {
                    contentEl.classList.toggle('is-open');
                    headerEl.classList.toggle('is-open');
                });

                groupEl.appendChild(headerEl);
                groupEl.appendChild(contentEl);
                container.appendChild(groupEl);
            });

            // 隱藏載入中，顯示內容
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('transcript-content').classList.remove('hidden');
        }

        // ==========================================

        // ==========================================
        // 初始化與身份驗證
        // ==========================================
        // 初始化與身份驗證 (真實資料庫讀取)
        // ==========================================

        // 定義大題結構與配分 (供前端自動計算大題總分與防呆使用)
        const QUESTION_GROUPS = {
            "Part1": { title: "第一大題", questions: ["1", "2", "3", "4", "5"], maxScore: 25 },
            "Part2": { title: "第二大題", questions: ["6", "7"], maxScore: 10 },

                title: "第五大題",
                questions: ["21", "22", "23-1", "23-2", "24", "25", "26", "27", "28", "29", "30-1", "30-2"],
                maxScore: 60
            }
        };

        function generateFakePublicData() {
            const fakeData = {
                totalStudents: 156, // 假裝有 156 人交卷
                groups: {
                    "Part1": {
                        title: "第一大題", maxScore: 25,
                        mean: 18.5, median: 20, high: 25, low: 5, uq: 25, lq: 15,
                        questions: ["1", "2", "3", "4", "5"]
                    },
                    "Part2": {
                        title: "第二大題", maxScore: 10,
                        mean: 7.2, median: 10, high: 10, low: 0, uq: 10, lq: 5,
                        questions: ["6", "7"]
                    },
                    "Part3": {
                        title: "第三大題", maxScore: 15,
                        mean: 9.8, median: 10, high: 15, low: 0, uq: 15, lq: 5,
                        questions: ["8", "9", "10"]
                    },
                    "Part4": {
                        title: "第四大題", maxScore: 50,
                        mean: 32.5, median: 35, high: 50, low: 10, uq: 40, lq: 25,
                        questions: Array.from({ length: 10 }, (_, i) => (i + 11).toString())
                    },
                    "Part5": {
                        title: "第五大題", maxScore: 60,
                        mean: 38.4, median: 40, high: 60, low: 15, uq: 50, lq: 30,
                        questions: ["21", "22", "23-1", "23-2", "24", "25", "26", "27", "28", "29", "30-1", "30-2"]
                    }
                },
                questions: {}
            };

            // 自動產生 1~30 題的單題假數據
            const allQuestionIds = Object.values(QUESTION_GROUPS).flatMap(group => group.questions);

            // 準備幾種不同難度的分數分佈模板，讓每一題的盒鬚圖高低錯落有致
            const distributionTemplates = [
                { median: 4, high: 5, low: 1, uq: 5, lq: 3 }, // 簡單題 (箱子偏高)
                { median: 3, high: 5, low: 0, uq: 4, lq: 2 }, // 中等題 (箱子置中)
                { median: 2, high: 5, low: 0, uq: 3, lq: 1 }, // 偏難題 (箱子偏低)
                { median: 5, high: 5, low: 2, uq: 5, lq: 4 }, // 送分題 (箱子極高)
                { median: 4, high: 5, low: 0, uq: 5, lq: 2 }  // 鑑別度高的題目 (箱子很長)
            ];

            allQuestionIds.forEach(qId => {
                // 每跑一題，就隨機抽選一個上面的模板
                const template = distributionTemplates[Math.floor(Math.random() * distributionTemplates.length)];

                fakeData.questions[qId] = {
                    // 讓平均分在該題的中位數附近隨機浮動
                    mean: +(template.median - 0.3 + Math.random() * 0.6).toFixed(1),
                    median: template.median,
                    high: template.high,
                    low: template.low,
                    uq: template.uq,
                    lq: template.lq
                };
            });

            return fakeData;
        }

        if (!auth) {
            document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Firebase 初始化失敗，請檢查金鑰設定。</p>`;
        } else {
            onAuthStateChanged(auth, async (user) => {
                if (!user || user.isAnonymous) {
                    document.body.innerHTML = `
                        <div class="flex items-center justify-center h-screen bg-gray-50">
                            <div class="text-center p-8 bg-white rounded-2xl shadow-sm border border-gray-100">
                                <span class="material-symbols-outlined text-red-400 text-5xl mb-4">lock</span>
                                <h2 class="text-xl font-bold text-gray-800">請先登入</h2>
                                <p class="text-gray-500 mt-2">您必須從主網站登入後才能查看成績單。</p>
                            </div>
                        </div>`;
                    return;
                }

                try {
                    document.getElementById('student-name').innerText = `學生：${user.displayName || user.email}`;

                    // ----------------------------------------------------
                    // 1. 取得學生個人成績
                    // ----------------------------------------------------
                    const myResultRef = doc(db, 'artifacts', 'dhjh-summer-camp', 'users', user.uid, 'exam_results', 'theory_test_1');
                    const myResultSnap = await getDoc(myResultRef);

                    if (!myResultSnap.exists()) {
                        document.getElementById('loading').innerHTML = `
                            <div class="text-center p-6">
                                <span class="material-symbols-outlined text-gray-400 text-5xl mb-2">assignment_late</span>
                                <p class="text-gray-600 font-bold mb-1">您尚未交卷或查無成績資料</p>
                                <p class="text-sm text-gray-400">請確認您已完成「暑期理論作答」並成功送出。</p>
                            </div>`;
                        return;
                    }

                    const rawStudentData = myResultSnap.data();
                    const rawTheoryScores = rawStudentData.theoryScores || {};

                    /* STREAMING_CHUNK:前端動態加總學生的各題得分為總分 */
                    // 【修正】將資料庫中的題號 (例如 "q1", "q23-1") 自動去除 "q" 前綴，以便跟成績單的純數字格式對應
                    const theoryScores = {};
                    Object.keys(rawTheoryScores).forEach(key => {
                        const cleanKey = key.replace(/^q/i, '');
                        theoryScores[cleanKey] = rawTheoryScores[key];
                    });

                    // 前端動態計算各大題得分與理論總分
                    let theoryTotalScore = 0;
                    const groupScores = {};
                    Object.entries(QUESTION_GROUPS).forEach(([groupId, groupInfo]) => {
                        groupScores[groupId] = groupInfo.questions.reduce((sum, qId) => {
                            const score = theoryScores[qId] || 0;
                            theoryTotalScore += score;
                            return sum + score;
                        }, 0);
                    });

                    const studentData = {
                        theoryTotalScore: theoryTotalScore,
                        theoryScores: theoryScores,
                        groupScores: groupScores
                    };

                    /* STREAMING_CHUNK:判斷作答人數來決定使用真實或模擬數據 */
                    // ----------------------------------------------------
                    // 2. 取得全班統計資料 (Public Data)
                    // ----------------------------------------------------
                    const publicStatsRef = doc(db, 'public_data', 'theory_test_1_stats');
                    const publicStatsSnap = await getDoc(publicStatsRef);

                    let publicData;
                    if (publicStatsSnap.exists() && publicStatsSnap.data().totalStudents > 1) {
                        // 有真實資料，且作答人數大於 1 時，使用真實平均計算
                        publicData = publicStatsSnap.data();
                    } else {
                        // 若沒有資料，或是作答人數只有 0 或 1 人，採用「掰的」平均分數
                        console.warn("作答人數 ≤ 1，系統自動採用模擬常態分佈資料。");
                        publicData = generateFakePublicData();
                    }

                    // ----------------------------------------------------
                    // 3. 渲染畫面
                    // ----------------------------------------------------
                    renderTranscript(studentData, publicData);

                } catch (e) {
                    console.error("資料讀取失敗:", e);
                    document.getElementById('loading').innerHTML = `
                        <div class="text-center p-6">
                            <span class="material-symbols-outlined text-red-500 text-5xl mb-2">error</span>
                            <p class="text-red-500 font-bold">資料讀取失敗</p>
                            <p class="text-xs text-gray-400 mt-2">${e.message}</p>
                        </div>`;
                }
            });
        }
    </script>
</body>

</html>
