<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資源專區</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f4f9;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 9999px;
            cursor: pointer;
            color: #444746;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 14px;
        }

        .sidebar-item:hover {
            background-color: #e8eaed;
        }

        .sidebar-item.active {
            background-color: #d3e3fd;
            color: #041e49;
        }

        .sidebar-item .material-symbols-outlined {
            font-size: 20px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-gray-800">

    <aside id="sidebar"
        class="w-64 flex flex-col p-3 gap-1 z-20 transition-transform duration-300 absolute md:relative -translate-x-full md:translate-x-0 h-full bg-[#f0f4f9]">
        <div class="p-4 mb-4 text-xl font-bold text-gray-700 flex items-center gap-3">
            <span class="material-symbols-outlined text-blue-600" style="font-size: 28px;">biotech</span>
            化學平台
        </div>

        <div class="flex-1 overflow-y-auto flex flex-col gap-1">
            <div class="sidebar-item active" data-page="home" data-title="首頁" data-show="true">
                <span class="material-symbols-outlined">home</span> 首頁
            </div>
            <div class="sidebar-item" data-page="notes" data-title="暑期講義題目" data-show="true">
                <span class="material-symbols-outlined">menu_book</span> 暑期講義題目
            </div>
            <div class="sidebar-item" data-page="exam-paper" data-title="暑期課程錄影" data-show="false">
                <span class="material-symbols-outlined">description</span> 暑期課程錄影
            </div>
            <div class="sidebar-item" data-page="exam-answer" data-title="暑期理論作答"
                data-src="TheoricalAnswerSheet/index.html" data-show="true">
                <span class="material-symbols-outlined">edit_square</span> 暑期理論作答
            </div>
            <div class="sidebar-item" data-page="transcript" data-title="暑期成績單" data-src="SummerTranscript.html" data-show="false">
                <span class="material-symbols-outlined">analytics</span> 暑期成績單
            </div>
            <div class="sidebar-item" data-page="exam-solution" data-title="暑期理論詳解">
                <span class="material-symbols-outlined">picture_as_pdf</span> 暑期理論詳解
            </div>
            <div class="sidebar-item" data-page="auction" data-title="暑期競標" data-show="true">
                <span class="material-symbols-outlined">gavel</span> 暑期競標
            </div>
        </div>
    </aside>

    <main
        class="flex-1 flex flex-col bg-white rounded-[32px] my-2 mr-2 ml-2 md:ml-0 shadow-sm relative overflow-hidden border border-gray-100">

        <header
            class="h-16 flex justify-between items-center px-6 border-b border-gray-100 shrink-0 bg-white/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-full hover:bg-gray-100 text-gray-600">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h2 id="page-title" class="text-lg font-medium text-gray-800">首頁</h2>
            </div>

            <div>
                <button id="login-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-medium transition-colors shadow-sm">
                    登入系統
                </button>
                <div id="user-profile"
                    class="hidden flex items-center gap-3 bg-gray-50 px-4 py-1.5 rounded-full border border-gray-200">
                    <img id="user-avatar" src="" alt="Avatar"
                        class="w-8 h-8 rounded-full border border-gray-200 hidden">
                    <div id="user-avatar-text"
                        class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-sm">
                        U</div>
                    <span id="user-name" class="text-sm font-medium text-gray-700"></span>
                    <button id="logout-btn" class="text-gray-400 hover:text-red-500 transition-colors flex items-center"
                        title="登出">
                        <span class="material-symbols-outlined" style="font-size: 20px;">logout</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 relative bg-[#f8fafc]">
            <!-- 子網站載入區 -->
            <iframe id="content-frame" class="w-full h-full border-0 bg-white" src="about:blank"></iframe>

            <div id="login-modal"
                class="hidden absolute inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex justify-center items-center opacity-0 transition-opacity duration-300">
                <div class="bg-white p-8 rounded-3xl shadow-2xl w-[400px] border border-gray-100 transform scale-95 transition-transform duration-300"
                    id="login-modal-box">

                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-bold text-gray-800">系統登入</h3>
                        <button id="close-modal-btn"
                            class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>

                    <!-- 紅色警告框 (保留並確保完美置中) -->
                    <div id="auth-error"
                        class="hidden mb-6 p-3 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 flex items-center justify-center text-center gap-2">
                        <span class="material-symbols-outlined text-base">error</span>
                        <span id="auth-error-text">錯誤訊息</span>
                    </div>

                    <!-- Google 登入按鈕 (已將上方的灰色文字徹底刪除) -->
                    <button id="google-login-btn"
                        class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-2xl transition-all active:scale-[0.98]">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        使用 Google 帳號登入
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // 匯入 GoogleAuthProvider 與 signInWithPopup
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ7cCQlXh8oiNzwnT2LL07KPt5TMaI2d8",
            authDomain: "dhjhweb.firebaseapp.com",
            projectId: "dhjhweb",
            storageBucket: "dhjhweb.firebasestorage.app",
            messagingSenderId: "763721572642",
            appId: "1:763721572642:web:fee3751366cba01bc0c57b",
            measurementId: "G-9CM3NBLLLS"
        };


        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // 追蹤當前登入狀態
        let currentUser = null;

        // ==========================================
        // ==========================================
        const iframe = document.getElementById('content-frame');
        const pageTitle = document.getElementById('page-title');
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');

        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        function getHomeHTML() {
            return `
                <!DOCTYPE html>
                <html><head>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
                </head>
                <body class="p-8 bg-[#f8fafc] text-gray-800 font-sans m-0 h-screen flex flex-col">
                    <h1 class="text-3xl font-bold mb-2">歡迎來到：敦化國中資優班  化學科補充資源專區</h1>
                    <p class="text-gray-500 mb-8">這是您的學習總部。請先於右上角登入後，再點擊左側選單進入各項功能。</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="p-6 bg-white rounded-[24px] border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                            <!-- 新增 flex 容器讓 icon 和標題並排 -->
                            <div class="flex items-center gap-2 mb-3">
                                <span class="material-symbols-outlined text-blue-500" style="font-size: 28px;">campaign</span>
                                <h3 class="text-lg font-bold text-gray-800 m-0">最新公告</h3>
                            </div>
                            <p class="text-gray-600 text-sm leading-relaxed">
                                系統已全面升級為模組化架構！<br>現在全面支援 Google 帳號一鍵登入，作答更安全。
                            </p>
                        </div>
                    </div>
                </body></html>
            `;
        }

        // 側邊欄點擊事件 (加入權限阻擋)
        sidebarItems.forEach(item => {
            item.addEventListener('click', (e) => {
                const pageId = item.getAttribute('data-page');
                const title = item.getAttribute('data-title');
                const src = item.getAttribute('data-src');

                if (pageId !== 'home' && !currentUser) {
                    showError("請先登入系統才能進入該頁面喔！");
                    openModal();
                    return; // 中斷執行，不會載入子網站
                }

                // 通過檢查，更新介面狀態
                sidebarItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                pageTitle.innerText = title;

                // 載入對應畫面
                if (src) {
                    iframe.src = src; // 載入理論試卷等獨立 html
                } else if (pageId === 'home') {
                    const doc = iframe.contentWindow.document;
                    doc.open(); doc.write(getHomeHTML()); doc.close();
                } else if (pageId === 'exam-solution') {
                    // 動態生成帶有防護機制的 PDF 預覽畫面
                    const doc = iframe.contentWindow.document;
                    doc.open();
                    doc.write(`
                        <!DOCTYPE html>
                        <html><head>
                            <title>理論試題詳解</title>
                            <style>
                                /* 設定灰色背景，並讓內容置中 */
                                body { margin: 0; padding: 24px; height: 100vh; background: #f8fafc; display: flex; justify-content: center; align-items: center; box-sizing: border-box; }
                                
                                /* 防止圈選文字與觸控長按 */
                                body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
                                
                                /* 縮小顯示的外框 (寬度 80%)，加上精美陰影 */
                                .pdf-wrapper { 
                                    width: 80%; 
                                    height: 95%; 
                                    border-radius: 20px; 
                                    overflow: hidden; 
                                    box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
                                    border: 1px solid #e2e8f0; 
                                    background: #e2e8f0; 
                                }
                                iframe { width: 100%; height: 100%; border: none; }
                            </style>
                        </head>
                        <!-- 封鎖滑鼠右鍵，防止另存新檔 -->
                        <body oncontextmenu="return false;">
                            <div class="pdf-wrapper">
                                <!-- 關鍵：加上 #toolbar=0 隱藏下載與列印按鈕，zoom=85 控制初始縮放比例 -->
                                <iframe src="Assets/solution.pdf#toolbar=0&navpanes=0&zoom=85" title="解析文件"></iframe>
                            </div>
                        </body></html>
                    `);
                    doc.close();
                } else {
                    const doc = iframe.contentWindow.document;
                    doc.open(); doc.write(`<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#666;"><h2>${title} 施工中...</h2></body>`); doc.close();
                }

                if (window.innerWidth < 768) {
                    sidebar.classList.add('-translate-x-full');
                }
            });
        });

        // 預設載入首頁
        document.querySelector('[data-page="home"]').click();

        // ==========================================
        // ==========================================
        const loginModal = document.getElementById('login-modal');
        const loginModalBox = document.getElementById('login-modal-box');
        const loginBtn = document.getElementById('login-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const authError = document.getElementById('auth-error');
        const authErrorText = document.getElementById('auth-error-text');

        function openModal() {
            loginModal.classList.remove('hidden');
            setTimeout(() => {
                loginModal.classList.remove('opacity-0');
                loginModalBox.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            loginModal.classList.add('opacity-0');
            loginModalBox.classList.add('scale-95');
            setTimeout(() => loginModal.classList.add('hidden'), 300);
            authError.classList.add('hidden');
        }

        function showError(msg) {
            authErrorText.innerText = msg;
            authError.classList.remove('hidden');
            loginModalBox.classList.add('animate-pulse');
            setTimeout(() => loginModalBox.classList.remove('animate-pulse'), 300);
        }

        loginBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);

        // 執行 Google 登入
        googleLoginBtn.addEventListener('click', async () => {
            authError.classList.add('hidden');
            googleLoginBtn.innerText = '登入處理中...';
            googleLoginBtn.disabled = true;

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                const userRef = doc(db, 'artifacts', 'dhjh-summer-camp', 'users', user.uid);
                await setDoc(userRef, {
                    name: user.displayName,
                    email: user.email,
                    lastLogin: new Date().toISOString()
                }, { merge: true });

                closeModal();
            } catch (error) {
                console.error("Google 登入錯誤:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError('登入失敗，請檢查網路或稍後再試。');
                }
            } finally {
                googleLoginBtn.innerHTML = `使用 Google 帳號登入`;
                googleLoginBtn.disabled = false;
            }
        });

        // ==========================================
        // ==========================================
        const userProfile = document.getElementById('user-profile');
        const userNameDisplay = document.getElementById('user-name');
        const userAvatarText = document.getElementById('user-avatar-text');
        const userAvatarImg = document.getElementById('user-avatar');
        const logoutBtn = document.getElementById('logout-btn');

        const navExam = document.querySelector('[data-page="exam-answer"]');
        const navTranscript = document.querySelector('[data-page="transcript"]');
        const navAuction = document.querySelector('[data-page="auction"]');
        const navSolution = document.querySelector('[data-page="exam-solution"]');

        onAuthStateChanged(auth, async (user) => {
            if (user && !user.isAnonymous) {
                // 已登入
                currentUser = user;
                loginBtn.classList.add('hidden');
                userProfile.classList.remove('hidden');

                const displayName = user.displayName || user.email.split('@')[0];
                userNameDisplay.innerText = displayName;

                // 如果 Google 有提供大頭貼就顯示，沒有就顯示字母
                if (user.photoURL) {
                    userAvatarImg.src = user.photoURL;
                    userAvatarImg.classList.remove('hidden');
                    userAvatarText.classList.add('hidden');
                } else {
                    userAvatarText.innerText = displayName.charAt(0).toUpperCase();
                    userAvatarImg.classList.add('hidden');
                    userAvatarText.classList.remove('hidden');
                }
                // 檢查是否已經交卷，動態切換側邊欄
                try {
                    const resultRef = doc(db, 'artifacts', appId, 'users', user.uid, 'exam_results', 'theory_test_1');
                    const snap = await getDoc(resultRef);
                    if (snap.exists() || localStorage.getItem('exam_submitted_' + user.uid) === 'true') {
                        if (navExam) navExam.style.display = 'none';
                        if (navTranscript) navTranscript.style.display = 'flex';
                        if (navAuction) navAuction.style.display = 'flex';
                        if (navSolution) navSolution.style.display = 'flex';
                    } else {
                        if (navExam) navExam.style.display = 'flex';
                        if (navTranscript) navTranscript.style.display = 'none';
                        if (navAuction) navAuction.style.display = 'none';
                        if (navSolution) navSolution.style.display = 'none';
                    }
                } catch (e) {
                    console.error("無法檢查交卷狀態:", e);
                }

            } else {
                // 未登入
                currentUser = null;
                loginBtn.classList.remove('hidden');
                userProfile.classList.add('hidden');

                if (navExam) navExam.style.display = 'flex';
                if (navTranscript) navTranscript.style.display = 'none';
                if (navAuction) navAuction.style.display = 'none';
                if (navSolution) navSolution.style.display = 'none';

                // 如果登出時，畫面停在需要權限的子網站，強制跳回首頁
                const activePage = document.querySelector('.sidebar-item.active').getAttribute('data-page');
                if (activePage !== 'home') {
                    document.querySelector('[data-page="home"]').click();
                }
            }
        });

        // 接收子系統 (Iframe) 傳來的交卷完畢訊息
        window.addEventListener('message', (event) => {
            if (event.data && event.data.action === 'exam_submitted') {
                // 1. 隱藏作答區，顯示成績單
                if (navExam) navExam.style.display = 'none';
                if (navTranscript) navTranscript.style.display = 'flex';
                // 2. 自動點擊「成績單」按鈕進行無縫跳轉
                if (navTranscript) navTranscript.click();
            }
        });

        // 登出
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
        });

    </script>
</body>

</html>
